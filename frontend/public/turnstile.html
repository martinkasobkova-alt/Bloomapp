<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ověření</title>
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js?onload=onTurnstileLoad" async defer></script>
  <style>
    body { font-family: system-ui; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #f8f7fc; }
    h2 { color: #2F3441; margin-bottom: 16px; }
    .cf-turnstile { margin: 16px 0; }
  </style>
</head>
<body>
  <h2>Ověření proti robotům</h2>
  <p style="color:#5D6472;font-size:14px;">Prosím dokončete ověření</p>
  <div class="cf-turnstile" id="turnstile"></div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var sitekey = params.get('sitekey');
      if (!sitekey) {
        document.body.innerHTML = '<p style="color:red">Chybí parametr sitekey</p>';
        return;
      }
      window.onTurnstileLoad = function() {
        turnstile.render('#turnstile', {
          sitekey: sitekey,
          callback: function(token) {
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(JSON.stringify({ token: token }));
            }
          },
          'expired-callback': function() {
            if (window.ReactNativeWebView) {
              window.ReactNativeWebView.postMessage(JSON.stringify({ token: null }));
            }
          }
        });
      };
    })();
  </script>
</body>
</html>
